services:
  frontend:
    build:
      context: ./frontend
    environment:
      - NEXT_TELEMETRY_DISABLED=1
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    environment:
      - PORT=3001
      - CORS_ORIGIN=https://${DOMAIN:-localhost}
    ports:
      - "127.0.0.1:3001:3001"
